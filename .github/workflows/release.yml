name: Build Desktop Installers

on:
  push:
    branches:
      - main
      - release/v1.0-stabilization
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundle_dir: dmg
            bundle_glob: frontend/src-tauri/target/release/bundle/dmg/*.dmg
            release_asset_label: dmg
          - platform: windows-latest
            bundle_dir: msi
            bundle_glob: frontend/src-tauri/target/release/bundle/msi/*.msi
            release_asset_label: msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify desktop assets
        working-directory: frontend
        run: npm run verify:desktop

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Initialize database snapshot
        shell: bash
        run: bash setup.sh

      - name: Verify finalized desktop assets
        working-directory: frontend
        run: npm run verify:desktop

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM for whisper-rs
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "16.0"
          directory: ${{ runner.temp }}/llvm

      - name: Configure LIBCLANG_PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure LIBCLANG_PATH
        if: runner.os != 'Windows'
        shell: bash
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/bin" >> "$GITHUB_ENV"

      - name: Check Rust formatting
        working-directory: frontend/src-tauri
        run: cargo fmt --check

      - name: Run clippy
        working-directory: frontend/src-tauri
        run: cargo clippy --all-targets --all-features

      - name: Run Rust tests
        working-directory: frontend/src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: frontend
          args: --bundles ${{ matrix.bundle_dir }}

      - name: Upload bundled installer
        uses: actions/upload-artifact@v4
        with:
          name: rhelo-${{ matrix.release_asset_label }}
          path: ${{ matrix.bundle_glob }}
