name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      BINDGEN_EXTRA_CLANG_ARGS: --target=x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM (For whisper-rs AI bindings)
        uses: KyleMayes/install-llvm-action@v0
        with:
          version: "16.0"
          directory: ${{ runner.temp }}/llvm

      - name: Configure LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/bin" >> $env:GITHUB_ENV

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./frontend
          tagName: app-v__VERSION__
          releaseName: "Windows App v__VERSION__"
          releaseBody: "Automated cloud build for Windows."
          releaseDraft: true
          prerelease: false
