version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rhelo-mcp-server
    volumes:
      - ./rhelo.db:/app/rhelo.db
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rhelo-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MCP_URL=http://localhost:8000/sse
    depends_on:
      - mcp-server
    restart: unless-stopped
