services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rhelo-mcp-server
    volumes:
      - ./rhelo.db:/data/rhelo.db
    ports:
      - "5050:5050"
    environment:
      - RHELO_API_PORT=5050
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rhelo-frontend
    ports:
      - "3000:80"
    depends_on:
      - mcp-server
    restart: unless-stopped
